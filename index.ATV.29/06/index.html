<!DOCTYPE html>
<html lang="UTF-8"></html>
<head>
<title>Minha pagina interativa</title>
<style>
    body{
        font-family: Arial,sans-serif;
        background: linear-grtadient(120deg,#ffb6c1,#add8e6);
        text-align: center;
        padding:40px;
    }
    .card {
        background: white;
        width:500px;
        margin:auto;
        padding: 30px;
        border-radius:20px;
        box-shadow:0 0 15px rgba(0,0,0,0.3);
    }
    h1{
        color:#d63384;
    }
    img{
        width:300px;
        border-radius; 15px;
        margin-top:15px;
    }
    button{
        background;#d63384;
        color:white;
        border:none;
        padding: 12px 18px;
        margin:8px;
        border-radius:10px;
        cursor:pointer;
        font-size:15px;
    }
    button:hover{
        background:#9b1c5a;
    }
    .escuro{
        background:#222;
        color:white;
    }
    .escuro .card{
        background:#333;
    }
    .escuro h1{
        color:#ffb6c1;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Minha pagina interativa</h1>
        <p>Esta pagina foi criada no VS Code usando HTML, CSS e JavaScript.</p>
        <img src="https://picsum.photos/300/200"alt="imagem aleatoria">
        <br><br>
    </div>
</body>.
